name = "trivianedge-react-site"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
tsconfig = "tsconfig.worker.json"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"

# IMPORTANT: Before deploying, set the GEMINI_API_KEY secret:
# Run: wrangler secret put GEMINI_API_KEY
# Then deploy: npm run build && wrangler deploy
