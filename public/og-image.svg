<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020203"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ambient glows -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="#22d3ee" opacity="0.06"/>
  <ellipse cx="1000" cy="480" rx="350" ry="220" fill="#8b5cf6" opacity="0.07"/>
  <!-- Grid lines -->
  <g opacity="0.07" stroke="white" stroke-width="0.5">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>
  <!-- Logo mark -->
  <g transform="translate(100,80)" filter="url(#glow)">
    <polygon points="0,30 75,30 55,0" fill="#60B46D" opacity="0.9"/>
    <polygon points="55,0 145,0 145,90" fill="#4DBC9F" opacity="0.9"/>
    <polygon points="145,90 145,0 235,0" fill="#46C5B3" opacity="0.9"/>
    <polygon points="220,30 295,30 240,0" fill="#40C9C8" opacity="0.9"/>
  </g>
  <!-- Company name -->
  <text x="100" y="210" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="-2">Trivian<tspan fill="#6b7280" font-weight="400">Edge</tspan></text>
  <!-- Gradient bar -->
  <rect x="100" y="230" width="500" height="3" fill="url(#accent)" rx="2"/>
  <!-- Headline -->
  <text x="100" y="310" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="white">BPO · Outsourcing · Offshore Teams</text>
  <text x="100" y="365" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="white">Software Development · AI Solutions</text>
  <!-- Subline -->
  <text x="100" y="430" font-family="Arial,sans-serif" font-size="22" fill="#9ca3af">Canada-Based Global Execution Partner · 6 Time Zones · 30-Day Deployment</text>
  <!-- CTA pill -->
  <rect x="100" y="475" width="320" height="56" rx="28" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <text x="260" y="510" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#22d3ee" letter-spacing="2">www.trivianedge.com</text>
  <!-- Right decoration -->
  <circle cx="980" cy="315" r="160" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.2"/>
  <circle cx="980" cy="315" r="120" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.2"/>
  <circle cx="980" cy="315" r="80" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
  <circle cx="980" cy="315" r="8" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
</svg>
