    <style>
        :root {
            /* Dark Theme (Default) */
            --cyan: #22d3ee;
            --violet: #8b5cf6;
            --magenta: #d946ef;
            
            --background: #020203;
            --text: #ffffff;
            --text-muted: #9ca3af;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.5);
            
            --btn-bg: #ffffff;
            --btn-text: #000000;
        }

        [data-theme="light"] {
            --background: #f8fafc;
            --text: #0f172a;
            --text-muted: #64748b;
            --surface: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
            
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            
            --btn-bg: #0f172a;
            --btn-text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            /* Safe area insets for iPhone notch / home indicator */
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        h1, h2, h3, h4 {
            font-family: 'Space Grotesk', sans-serif;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px var(--glass-shadow);
        }
        .bg-grid {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, var(--border) 1px, transparent 1px),
                linear-gradient(to bottom, var(--border) 1px, transparent 1px);
        }
        .scan-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
            opacity: 0.3;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 0.5; }
            95% { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .glow-pulse {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        
        @keyframes neon-glow-shift {
            0%, 100% { 
                box-shadow: 0 0 30px -5px rgba(34, 211, 238, 0.5), 0 0 15px -2px rgba(34, 211, 238, 0.3);
                border-color: rgba(34, 211, 238, 0.4);
            }
            50% { 
                box-shadow: 0 0 50px -5px rgba(139, 92, 246, 0.6), 0 0 25px -2px rgba(139, 92, 246, 0.4);
                border-color: rgba(139, 92, 246, 0.5);
            }
        }

        @keyframes hue-rotate-border {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes fade-in {
             from { opacity: 0; transform: translateY(10px); }
             to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
        
        .hover-neon-glow {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 1;
        }
        
        .hover-neon-glow::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, var(--cyan), var(--violet), var(--magenta), var(--cyan));
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: -1;
        }
        
        .hover-neon-glow:hover {
            transform: scale(1.03) translateY(-8px);
            animation: neon-glow-shift 4s ease-in-out infinite;
        }
        
        .hover-neon-glow:hover::before {
            opacity: 1;
            animation: hue-rotate-border 6s linear infinite;
        }

        .service-card-glow {
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        .service-card-glow:hover {
            transform: translateY(-5px) scale(1.02);
            animation: neon-glow-shift 3s infinite ease-in-out;
            border-color: rgba(34, 211, 238, 0.5);
        }

        .text-gradient {
            background: linear-gradient(to right, var(--text), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease-out, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--background);
        }
        ::-webkit-scrollbar-thumb {
            background: #1e1e2e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--violet);
        }
        .dashed-border {
            background-image: linear-gradient(to right, rgba(255,255,255,0.2) 50%, transparent 50%);
            background-position: bottom;
            background-size: 10px 1px;
            background-repeat: repeat-x;
        }

        /* Digital Glitch Effect - Refined */
        .glitch-text {
            position: relative;
            display: inline-block;
        }
        
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .glitch-text:hover::before,
        .glitch-text:hover::after {
            opacity: 1;
        }

        .glitch-text:hover::before {
            color: var(--cyan);
            z-index: -1;
            animation: glitch-anim-1 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            left: -2px;
            text-shadow: 2px 0 var(--magenta);
        }
        
        .glitch-text:hover::after {
            color: var(--magenta);
            z-index: -2;
            animation: glitch-anim-2 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite reverse;
            left: 2px;
            text-shadow: -2px 0 var(--cyan);
        }
        
        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-4px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(4px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-4px, -2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(4px, 2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-4px, 2px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(4px, -2px); }
        }
        
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(4px, -1px); }
            20% { clip-path: inset(30% 0 20% 0); transform: translate(-4px, 2px); }
            40% { clip-path: inset(70% 0 10% 0); transform: translate(4px, 2px); }
            60% { clip-path: inset(20% 0 50% 0); transform: translate(-4px, -1px); }
            80% { clip-path: inset(60% 0 30% 0); transform: translate(4px, 1px); }
            100% { clip-path: inset(5% 0 80% 0); transform: translate(-4px, -2px); }
        }
        /* Disable heavy hover transforms on touch devices */
        @media (hover: none) {
            .hover-neon-glow:hover {
                transform: none;
                animation: none;
            }
            .service-card-glow:hover {
                transform: none;
            }
        }

        /* Mobile tap target minimum size */
        @media (max-width: 640px) {
            button, a {
                min-height: 44px;
            }
        }

        /* ================================================================
           2050-READY DESIGN SYSTEM
           ================================================================ */

        /* --- Custom Cursor (desktop only) --- */
        @media (hover: hover) and (pointer: fine) {
            * { cursor: none !important; }
        }
        #cursor-dot {
            width: 8px; height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
            box-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(34,211,238,0.4);
        }
        #cursor-ring {
            width: 36px; height: 36px;
            border: 1.5px solid rgba(34,211,238,0.5);
            border-radius: 50%;
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 99998;
            transform: translate(-50%, -50%);
            transition: width 0.35s cubic-bezier(0.23,1,0.32,1),
                        height 0.35s cubic-bezier(0.23,1,0.32,1),
                        border-color 0.35s;
        }
        body:has(a:hover, button:hover) #cursor-dot {
            width: 14px; height: 14px;
            background: var(--violet);
            box-shadow: 0 0 20px var(--violet), 0 0 40px rgba(139,92,246,0.4);
        }
        body:has(a:hover, button:hover) #cursor-ring {
            width: 56px; height: 56px;
            border-color: rgba(139,92,246,0.5);
        }
        @media (hover: none) {
            #cursor-dot, #cursor-ring { display: none; }
        }

        /* --- Scroll Progress Bar --- */
        #scroll-progress {
            position: fixed; top: 0; left: 0; height: 2px; z-index: 9998;
            background: linear-gradient(90deg, var(--cyan), var(--violet), var(--magenta));
            width: 0%; transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(34,211,238,0.6);
        }

        /* --- Grain / Noise Texture Overlay --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9997;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* --- Aurora / Mesh Gradient Background --- */
        #aurora {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        #aurora::before {
            content: '';
            position: absolute;
            width: 80vw; height: 80vh;
            top: -20%; left: -20%;
            background: radial-gradient(ellipse, rgba(34,211,238,0.06) 0%, transparent 70%);
            animation: aurora-1 18s ease-in-out infinite alternate;
        }
        #aurora::after {
            content: '';
            position: absolute;
            width: 70vw; height: 70vh;
            bottom: -20%; right: -20%;
            background: radial-gradient(ellipse, rgba(139,92,246,0.07) 0%, transparent 70%);
            animation: aurora-2 22s ease-in-out infinite alternate;
        }
        @keyframes aurora-1 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 8%) scale(1.1); }
            100% { transform: translate(-5%, 15%) scale(0.95); }
        }
        @keyframes aurora-2 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-8%, -10%) scale(1.08); }
            100% { transform: translate(12%, -5%) scale(1.02); }
        }

        /* --- Enhanced Glassmorphism --- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 40px var(--glass-shadow),
                        inset 0 1px 0 rgba(255,255,255,0.05);
        }
        [data-theme="light"] .glass {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
        }

        /* --- 3D Card Tilt — JS-driven via CSS vars --- */
        .tilt-card {
            transform-style: preserve-3d;
            transform: perspective(1000px)
                rotateX(calc(var(--tilt-x, 0) * 1deg))
                rotateY(calc(var(--tilt-y, 0) * 1deg));
            transition: transform 0.15s ease;
            will-change: transform;
        }
        .tilt-card:not(:hover) {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            transition: transform 0.5s ease;
        }

        /* --- Holographic gradient text variant --- */
        .text-holo {
            background: linear-gradient(135deg, #22d3ee, #6366f1, #8b5cf6, #d946ef, #22d3ee);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: holo-shift 6s ease infinite;
        }
        @keyframes holo-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Magnetic button effect (applied via JS) --- */
        .btn-magnetic { transition: transform 0.3s cubic-bezier(0.23,1,0.32,1); }

        /* --- Bento grid helper --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .bento-grid-2 { grid-column: span 2; }
        @media (max-width: 768px) { .bento-grid-2 { grid-column: span 1; } }

        /* --- Animated border gradient — used on featured cards --- */
        .border-gradient-animated::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(135deg, var(--cyan), var(--violet), var(--magenta), var(--cyan));
            background-size: 300% 300%;
            animation: holo-shift 4s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box,
                          linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            pointer-events: none;
        }

        /* --- Floating badge pulse --- */
        @keyframes float-badge {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .float-badge { animation: float-badge 3s ease-in-out infinite; }

        /* --- Neural network dot background --- */
        .neural-bg {
            background-image:
                radial-gradient(circle, rgba(34,211,238,0.15) 1px, transparent 1px),
                radial-gradient(circle, rgba(139,92,246,0.1) 1px, transparent 1px);
            background-size: 50px 50px, 80px 80px;
            background-position: 0 0, 25px 25px;
        }

        /* --- Shimmer skeleton loader --- */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer {
            background: linear-gradient(90deg,
                rgba(255,255,255,0.03) 25%,
                rgba(255,255,255,0.08) 50%,
                rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* --- Highlight text accent --- */
        .highlight-cyan {
            position: relative;
            display: inline;
        }
        .highlight-cyan::after {
            content: '';
            position: absolute;
            bottom: 2px; left: 0; right: 0;
            height: 30%;
            background: rgba(34,211,238,0.2);
            border-radius: 2px;
            z-index: -1;
        }
    </style>
